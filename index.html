<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Serviços de Manutenção</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root {
  --energisa-blue:#0097CE;
  --energisa-orange:#F36F21;
}

body {font-family:"Segoe UI"; background:#eef6fa; margin:0;}

.card {
  max-width:900px;
  margin:30px auto;
  padding:25px;
  background:#fff;
  border-radius:14px;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.hidden{display:none}

#previewBox img{max-height:120px;border-radius:8px}
</style>
</head>

<body>

<div class="card">
<h2>FORMULÁRIO</h2>

<form id="llForm">

<!-- BOTÕES -->
<div style="display:flex; gap:10px; margin-bottom:10px;">
  <button type="button" id="btnCamera" style="background:#F36F21;">
    📷 Tirar Foto
  </button>

  <button type="button" id="btnGaleria" style="background:#0097CE;">
    🖼️ Galeria
  </button>
</div>

<!-- INPUTS -->
<input id="file" name="arquivos" type="file" multiple required style="display:none;">
<input id="fileCamera" type="file" accept="image/*" capture="environment" multiple style="display:none;">
<input id="fileGaleria" type="file" accept="image/*" multiple style="display:none;">

<div id="previewBox" style="display:flex; gap:10px; flex-wrap:wrap;"></div>

<button type="submit">Enviar</button>

</form>
</div>

<script>
/* =============================================================
   CONTROLE DE ARQUIVOS (CAMERA + GALERIA)
============================================================= */
const fileInput = document.getElementById("file");
const fileCamera = document.getElementById("fileCamera");
const fileGaleria = document.getElementById("fileGaleria");
const btnCamera = document.getElementById("btnCamera");
const btnGaleria = document.getElementById("btnGaleria");
const previewBox = document.getElementById("previewBox");

let arquivosSelecionados = [];

btnCamera.onclick = () => fileCamera.click();
btnGaleria.onclick = () => fileGaleria.click();

fileCamera.addEventListener("change", e => {
  adicionarArquivos(e.target.files);
  fileCamera.value = "";
});

fileGaleria.addEventListener("change", e => {
  adicionarArquivos(e.target.files);
  fileGaleria.value = "";
});

function adicionarArquivos(files) {
  for (const f of files) {
    if (f.type.startsWith("image/")) {
      arquivosSelecionados.push(f);
    }
  }
  sincronizarInput();
  renderPreview();
}

function sincronizarInput() {
  const dt = new DataTransfer();
  arquivosSelecionados.forEach(f => dt.items.add(f));
  fileInput.files = dt.files;
}

function renderPreview() {
  previewBox.innerHTML = "";

  arquivosSelecionados.forEach((f, index) => {
    const div = document.createElement("div");
    div.style.position = "relative";

    const img = document.createElement("img");
    img.src = URL.createObjectURL(f);

    const btn = document.createElement("button");
    btn.innerHTML = "×";
    btn.style.position = "absolute";
    btn.style.top = "-5px";
    btn.style.right = "-5px";
    btn.style.background = "red";
    btn.style.borderRadius = "50%";
    btn.style.width = "25px";
    btn.style.height = "25px";

    btn.onclick = () => {
      arquivosSelecionados.splice(index,1);
      sincronizarInput();
      renderPreview();
    };

    div.appendChild(img);
    div.appendChild(btn);
    previewBox.appendChild(div);
  });
}

/* =============================================================
   COMPRESSÃO
============================================================= */
function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.src=e.target.result;
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const scale=Math.min(1,1280/img.width);
        canvas.width=img.width*scale;
        canvas.height=img.height*scale;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        canvas.toBlob(b=>resolve(b),"image/jpeg",0.7);
      };
    };
    reader.readAsDataURL(file);
  });
}

/* =============================================================
   SUBMIT
============================================================= */
document.getElementById("llForm").onsubmit = async e=>{
  e.preventDefault();

  if(!arquivosSelecionados.length){
    alert("Adicione imagens");
    return;
  }

  const fd = new FormData();

  for(let i=0;i<arquivosSelecionados.length;i++){
    const blob = await compressImage(arquivosSelecionados[i]);
    fd.append("arquivos", new File([blob],`foto_${i}.jpg`));
  }

  alert("Simulação envio OK 🔥");
};
</script>

</body>
</html>
